<svg xmlns="http://www.w3.org/2000/svg" width="760" height="460" viewBox="0 0 760 460" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">MSP operations overview dashboard</title>
  <desc id="desc">Floating cards showing devices online, security alerts, backup status, open tickets, system health and patch compliance.</desc>
  <defs>
    <linearGradient id="panel" x1="380" y1="24" x2="380" y2="434" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EDF5FC"/>
      <stop offset="1" stop-color="#DEEAF7"/>
    </linearGradient>
    <linearGradient id="barTrack" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#E8EEF5"/>
      <stop offset="1" stop-color="#DEE7F0"/>
    </linearGradient>
    <linearGradient id="barFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#63A8FF"/>
      <stop offset="1" stop-color="#3F82E6"/>
    </linearGradient>
    <filter id="shadowSoft" x="-25%" y="-25%" width="150%" height="180%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#5D738D" flood-opacity="0.12"/>
    </filter>
    <style>
      .label { fill: #546478; font: 600 13px/1.2 Inter, Arial, sans-serif; }
      .value { fill: #132338; font: 700 33px/1.1 Inter, Arial, sans-serif; }
      .sub { fill: #718196; font: 500 11px/1.2 Inter, Arial, sans-serif; }
      .mini { fill: #5A6B80; font: 600 10px/1.2 Inter, Arial, sans-serif; }
    </style>
  </defs>

  <rect x="20" y="24" width="720" height="410" rx="28" fill="url(#panel)"/>
  <rect x="57" y="63" width="646" height="332" rx="24" fill="#EFF5FC"/>

  <g filter="url(#shadowSoft)">
    <rect x="76" y="76" width="238" height="104" rx="14" fill="#FFF" stroke="#DCE7F2"/>
    <rect x="95" y="95" width="25" height="20" rx="5" fill="#E8F1FB" stroke="#CFE0F2"/>
    <rect x="98" y="99" width="19" height="3" rx="1.5" fill="#7EAEE7"/>
    <rect x="98" y="105" width="19" height="3" rx="1.5" fill="#9BC1EC"/>
    <rect x="98" y="111" width="13" height="3" rx="1.5" fill="#B2CDEB"/>
    <text x="128" y="108" class="label">Devices Online</text>
    <text x="96" y="154" class="value">362</text>
    <text x="174" y="154" class="sub">managed endpoints</text>
  </g>

  <g filter="url(#shadowSoft)">
    <rect x="292" y="62" width="190" height="96" rx="14" fill="#FFF" stroke="#DCE7F2"/>
    <path d="M311 103V90l8-6 8 6v13c0 5-4 8-8 10-4-2-8-5-8-10Z" fill="#EAF8F0" stroke="#B9E3CA"/>
    <path d="M319 94h0M319 95l4 3 5-6" stroke="#4FAF72" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="338" y="95" class="label">Security Alerts</text>
    <text x="311" y="135" class="value" fill="#DA7D2A">3</text>
    <text x="346" y="135" class="sub">active warnings</text>
  </g>

  <g filter="url(#shadowSoft)">
    <rect x="494" y="84" width="188" height="96" rx="14" fill="#FFF" stroke="#DCE7F2"/>
    <ellipse cx="516" cy="102" rx="11" ry="4.5" fill="#DCECFB" stroke="#C2DAF2"/>
    <path d="M505 102v13c0 2.7 4.9 4.9 11 4.9s11-2.2 11-4.9v-13" fill="#EAF3FB" stroke="#C2DAF2"/>
    <ellipse cx="516" cy="115" rx="11" ry="4.9" fill="#EAF3FB" stroke="#C2DAF2"/>
    <text x="536" y="109" class="label">Backup Status</text>
    <text x="507" y="144" style="fill:#28A064;font:700 25px/1 Inter, Arial, sans-serif;">Healthy</text>
  </g>

  <g filter="url(#shadowSoft)">
    <rect x="97" y="193" width="222" height="104" rx="14" fill="#FFF" stroke="#DCE7F2"/>
    <path d="M118 214h15l5 8-5 8h-15l-5-8 5-8Z" fill="#EAF1FC" stroke="#C9DCF2"/>
    <path d="M115 220h22M115 224h18" stroke="#81AEE6" stroke-width="2" stroke-linecap="round"/>
    <text x="147" y="223" class="label">Open Tickets</text>
    <text x="116" y="269" class="value">18</text>
    <text x="169" y="269" class="sub">awaiting action</text>
  </g>

  <g filter="url(#shadowSoft)">
    <rect x="240" y="280" width="252" height="130" rx="16" fill="#FFF" stroke="#DCE7F2"/>
    <text x="260" y="304" class="label">System Health</text>

    <circle cx="315" cy="348" r="34" stroke="#E7EDF4" stroke-width="12" fill="none"/>
    <circle cx="315" cy="348" r="34" stroke="#5DAE6F" stroke-width="12" stroke-linecap="round" stroke-dasharray="134 214" transform="rotate(-90 315 348)" fill="none"/>
    <circle cx="315" cy="348" r="34" stroke="#F0B455" stroke-width="12" stroke-linecap="round" stroke-dasharray="44 214" transform="rotate(135 315 348)" fill="none"/>
    <circle cx="315" cy="348" r="34" stroke="#E46E69" stroke-width="12" stroke-linecap="round" stroke-dasharray="26 214" transform="rotate(210 315 348)" fill="none"/>

    <circle cx="375" cy="332" r="5" fill="#5DAE6F"/>
    <text x="388" y="336" class="mini">Healthy</text>
    <circle cx="375" cy="351" r="5" fill="#F0B455"/>
    <text x="388" y="355" class="mini">Warning</text>
    <circle cx="375" cy="370" r="5" fill="#E46E69"/>
    <text x="388" y="374" class="mini">Critical</text>
  </g>

  <g filter="url(#shadowSoft)">
    <rect x="464" y="210" width="222" height="112" rx="14" fill="#FFF" stroke="#DCE7F2"/>
    <rect x="484" y="228" width="18" height="18" rx="5" fill="#E9F2FC" stroke="#C7DCF2"/>
    <path d="M489 237h8" stroke="#7AADE8" stroke-width="2" stroke-linecap="round"/>
    <text x="510" y="241" class="label">Patch Compliance</text>
    <text x="483" y="281" style="fill:#132338;font:700 30px/1 Inter, Arial, sans-serif;">92%</text>
    <text x="546" y="281" class="sub">updated this cycle</text>
    <rect x="484" y="292" width="182" height="10" rx="5" fill="url(#barTrack)"/>
    <rect x="484" y="292" width="167" height="10" rx="5" fill="url(#barFill)"/>
  </g>

  <circle cx="87" cy="64" r="6" fill="#D7E6F6"/>
  <circle cx="686" cy="63" r="5" fill="#D0E2F4"/>
  <circle cx="699" cy="391" r="7" fill="#D7E8F9"/>
</svg>